name: Feature request
description: Propose a generic tournament, format, provider, or reporting capability.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the user workflow or unsupported tournament contract.
    validations:
      required: true
  - type: textarea
    id: contract
    attributes:
      label: Proposed public contract
      description: Explain configuration, CLI, schema, output, and failure behavior.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence and data rights
      description: Cite public rules or provider documentation without attaching raw payloads.
  - type: checkboxes
    id: scope
    attributes:
      label: Scope confirmation
      options:
        - label: The proposal keeps deterministic offline workflows usable without secrets.
          required: true
        - label: The proposal does not assume affiliation with a governing body or provider.
          required: true
