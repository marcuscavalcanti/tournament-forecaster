name: Bug report
description: Report reproducible incorrect behavior in Tournament Forecaster.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, private provider payloads, or undisclosed vulnerabilities. Use Private Vulnerability Reporting for security issues.
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: 0.1.0 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: python
    attributes:
      label: Python version
      options: ["3.11", "3.12", "3.13"]
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
      description: Include the exact command, sanitized output, and exit code.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Prefer a synthetic configuration that contains no private data.
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Safety checks
      options:
        - label: I removed credentials, personal paths, and raw provider data.
          required: true
        - label: This is not an undisclosed security vulnerability.
          required: true
