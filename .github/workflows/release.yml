name: Release artifact check

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  artifact-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install 'build>=1.2,<2' 'twine>=6,<7'
      - name: Build source and wheel artifacts
        run: python -m build
      - name: Check artifact metadata
        run: python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: tournament-forecaster-distributions
          path: dist/*
          if-no-files-found: error
