name: Release artifact check

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  version-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
      - name: Require the release tag to match package metadata
        env:
          RELEASE_REF_TYPE: ${{ github.ref_type }}
          RELEASE_TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          if os.environ["RELEASE_REF_TYPE"] != "tag":
              raise SystemExit("release artifact checks require an annotated or lightweight tag")
          project = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]
          version = project["version"]
          expected = f"v{version}"
          if os.environ["RELEASE_TAG"] != expected:
              raise SystemExit(
                  f"release tag {os.environ['RELEASE_TAG']!r} must equal {expected!r}"
              )
          PY

  release-gate:
    uses: ./.github/workflows/release-gate.yml
    permissions:
      contents: read

  artifact-check:
    needs: [version-contract, release-gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
      - run: >-
          python -m pip install
          'build>=1.2,<2'
          'hatchling>=1.27,<2'
          'twine>=6,<7'
      - name: Build source and wheel artifacts
        run: python -m build --no-isolation
      - name: Check artifact metadata
        run: python -m twine check dist/*
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: tournament-forecaster-distributions
          path: dist/*
          if-no-files-found: error
