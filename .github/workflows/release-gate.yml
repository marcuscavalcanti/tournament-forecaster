name: Reusable release gate

on:
  workflow_call:

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  full-history-secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Install checksum-pinned gitleaks 8.30.1
        env:
          GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        shell: bash
        run: |
          set -euo pipefail
          archive="gitleaks_8.30.1_linux_x64.tar.gz"
          url="https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/${archive}"
          curl --fail --location --proto '=https' --tlsv1.2 --retry 3 --output "${RUNNER_TEMP}/${archive}" "${url}"
          printf '%s  %s\n' "${GITLEAKS_SHA256}" "${RUNNER_TEMP}/${archive}" | sha256sum --check
          mkdir -p "${RUNNER_TEMP}/gitleaks-bin"
          tar -xzf "${RUNNER_TEMP}/${archive}" -C "${RUNNER_TEMP}/gitleaks-bin" gitleaks
          echo "${RUNNER_TEMP}/gitleaks-bin" >> "${GITHUB_PATH}"
      - name: Scan the complete release history
        run: gitleaks git . --redact --log-opts=--all

  native-clean-install:
    name: Native source and wheel / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - name: Online source-install onboarding
        run: python -m pytest -q tests/test_clean_source_install.py
      - name: Offline clean-wheel onboarding
        run: python -m pytest -q tests/test_clean_wheel.py
      - name: Platform-specific results provider apply
        run: python -m pytest -q tests/tournament_forecaster/test_results_provider.py
