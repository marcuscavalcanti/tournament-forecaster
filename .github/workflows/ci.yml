name: CI

on:
  workflow_call:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  offline-product:
    name: Offline product / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - name: Socket-denied live simulation, backtest, and public contracts
        env:
          TOURNAMENT_FORECASTER_INNER_MAKE_VALIDATE: "1"
        run: >-
          pytest -q --disable-socket
          tests/test_public_repository_contract.py
          tests/test_readme_diagrams.py
          tests/presets/test_format_contracts.py
          tests/examples/test_world_cup_2026_live.py
          tests/test_tournament_forecast_cli.py

  quality-and-wheel:
    name: Scoped quality and clean wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - name: Ruff public package and generic tests
        run: >-
          ruff check
          src/tournament_forecaster
          tests/tournament_forecaster
          tests/presets
          tests/examples
          tests/test_tournament_forecast_cli.py
          tests/test_clean_wheel.py
          tests/test_public_repository_contract.py
          tests/test_readme_diagrams.py
          scripts/check_english_surface.py
          docs/assets/architecture/generate.py
          --exclude src/tournament_forecaster/compatibility
          --exclude tests/tournament_forecaster/test_legacy_compatibility.py
          --select E4,E7,E9,F
      - name: Strict Ruff for the public repository gate
        run: >-
          ruff check
          scripts/check_english_surface.py
          tests/test_clean_wheel.py
          tests/test_public_repository_contract.py
          tests/test_readme_diagrams.py
          docs/assets/architecture/generate.py
          --select E,F,I,UP,B,SIM
      - name: Mypy public package and English scanner
        run: >-
          mypy
          src/tournament_forecaster/config.py
          src/tournament_forecaster/resources.py
          src/tournament_forecaster/providers/results.py
          src/tournament_forecaster/backtest.py
          scripts/check_english_surface.py
          docs/assets/architecture/generate.py
      - name: English public surface
        run: python scripts/check_english_surface.py
      - name: Architecture asset manifest
        run: python docs/assets/architecture/generate.py --check
      - name: Pristine clone make validate
        run: >-
          pytest -q
          tests/test_public_repository_contract.py::test_pristine_clone_make_validate_installs_declared_test_dependencies
      - name: Full tracked test baseline
        env:
          TOURNAMENT_FORECASTER_INNER_MAKE_VALIDATE: "1"
        run: pytest -q --ignore=tests/test_clean_wheel.py
      - name: Build and inspect clean wheel
        run: pytest -q tests/test_clean_wheel.py
      - name: Build distributions
        run: python -m build --no-isolation
      - name: Check distribution metadata
        run: python -m twine check dist/*

  architecture-assets:
    name: Reference architecture render parity
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
      - name: Verify reference SVG-to-PNG exports
        run: python docs/assets/architecture/generate.py --check-render
