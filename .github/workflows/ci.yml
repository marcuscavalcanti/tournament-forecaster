name: CI

on:
  workflow_call:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  offline-product:
    name: Offline product / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - name: Socket-denied live simulation, backtest, and public contracts
        env:
          TOURNAMENT_FORECASTER_INNER_MAKE_VALIDATE: "1"
        run: >-
          pytest -q --disable-socket
          tests/test_public_repository_contract.py
          tests/test_readme_diagrams.py
          tests/presets/test_format_contracts.py
          tests/examples/test_openfootball_world_cup_2026.py
          tests/test_tournament_forecast_cli.py

  quality-and-wheel:
    name: Scoped quality and clean wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
          cache: pip
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.21"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - name: Ruff E/F gate for public package and generic tests
        run: >-
          ruff check
          src/tournament_forecaster
          tests/tournament_forecaster
          tests/presets
          tests/examples
          tests/test_tournament_forecast_cli.py
          tests/test_clean_wheel.py
          tests/test_clean_source_install.py
          tests/test_public_repository_contract.py
          tests/test_readme_diagrams.py
          docs/assets/architecture/generate.py
          --select E4,E7,E9,F
      - name: Strict Ruff for green release and provider contract targets
        run: >-
          ruff check
          src/tournament_forecaster/providers/security.py
          tests/test_clean_wheel.py
          tests/test_clean_source_install.py
          tests/test_public_repository_contract.py
          tests/test_readme_diagrams.py
          tests/tournament_forecaster/test_results_provider.py
          tests/tournament_forecaster/test_odds_provider.py
          docs/assets/architecture/generate.py
          --select E,F,I,UP,B,SIM
      - name: Public-core complexity ceiling
        run: >-
          ruff check
          src/tournament_forecaster
          --select C901
      - name: Package-wide strict Mypy for public package
        run: >-
          mypy
          --no-incremental
          src/tournament_forecaster
          docs/assets/architecture/generate.py
      - name: Architecture asset manifest
        run: python docs/assets/architecture/generate.py --check
      - name: Pristine clone make validate
        run: >-
          pytest -q
          tests/test_public_repository_contract.py::test_pristine_clone_make_validate_installs_declared_test_dependencies
      - name: Clean source-install onboarding
        run: pytest -q tests/test_clean_source_install.py
      - name: Full tracked test baseline with public-core branch coverage
        env:
          TOURNAMENT_FORECASTER_INNER_MAKE_VALIDATE: "1"
        run: >-
          pytest -q --ignore=tests/test_clean_wheel.py
          --cov=tournament_forecaster
          --cov-branch
          --cov-report=term-missing
          --cov-fail-under=83
      - name: Build and inspect clean wheel
        run: pytest -q tests/test_clean_wheel.py
      - name: Build distributions
        run: python -m build --no-isolation
      - name: Check distribution metadata
        run: python -m twine check dist/*

  architecture-assets:
    name: Reference architecture render parity
    runs-on: macos-26
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
      - name: Verify reference SVG-to-PNG exports
        run: python docs/assets/architecture/generate.py --check-render
