[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tournament-forecaster"
version = "0.1.1"
description = "Configuration-driven tournament forecasting."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "Marcus Cavalcanti" }]
dependencies = []
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Operating System :: MacOS",
  "Operating System :: POSIX :: Linux",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Scientific/Engineering :: Information Analysis",
]

[project.optional-dependencies]
dev = [
  "build>=1.2,<2",
  "hatchling>=1.27,<2",
  "jsonschema>=4.23,<5",
  "mypy>=1.13,<2",
  "Pillow>=11,<13",
  "pytest>=8.3,<10",
  "pytest-cov>=6,<8",
  "pytest-socket>=0.7,<1",
  "ruff>=0.9,<1",
  "twine>=6,<7",
  "types-jsonschema>=4.23,<5",
]

[project.urls]
Homepage = "https://github.com/marcuscavalcanti/tournament-forecaster"
Documentation = "https://github.com/marcuscavalcanti/tournament-forecaster#readme"
Issues = "https://github.com/marcuscavalcanti/tournament-forecaster/issues"
Source = "https://github.com/marcuscavalcanti/tournament-forecaster"

[project.scripts]
tournament-forecast = "tournament_forecaster.cli:main"

[tool.hatch.build.targets.wheel]
sources = ["src"]
include = [
  "/src/tournament_forecaster/__init__.py",
  "/src/tournament_forecaster/__main__.py",
  "/src/tournament_forecaster/atomic_io.py",
