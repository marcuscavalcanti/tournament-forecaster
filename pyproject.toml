exclude = [
  "/.github",
  "/.venv",
  "/attachments",
  "/build",
  "/data",
  "/dist",
  "/outputs",
  "/provider_raw",
  "/raw_provider_payloads",
  "/scripts",
  "/tests",
  "/uv.lock",
  "/**/__pycache__",
  "/**/*.local.*",
  "/**/*.pyc",
  "/**/*.pyo",
  "/**/outputs/**",
]

[tool.pytest.ini_options]
pythonpath = [".", "src"]
testpaths = ["tests"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F"]

[tool.ruff.lint.mccabe]
max-complexity = 45

[tool.mypy]
python_version = "3.11"
strict = true
warn_unreachable = true
