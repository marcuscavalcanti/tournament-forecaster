[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tournament-forecaster"
version = "0.1.0"
description = "Configuration-driven tournament forecasting."
requires-python = ">=3.11"
dependencies = []

[project.scripts]
tournament-forecast = "tournament_forecaster.cli:main"
worldcup-brazil-report = "worldcup_brazil.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/tournament_forecaster", "worldcup_brazil"]

[tool.pytest.ini_options]
pythonpath = [".", "src"]
testpaths = ["tests"]
