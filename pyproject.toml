  "/src/tournament_forecaster/data/templates/group-two-leg-knockout/README.md",
  "/src/tournament_forecaster/data/templates/group-two-leg-knockout/tournament.json",
  "/src/tournament_forecaster/data/templates/league-knockout/README.md",
