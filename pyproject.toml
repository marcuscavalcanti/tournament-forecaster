  "/src/tournament_forecaster/council/prompts.py",
  "/src/tournament_forecaster/council/providers.py",
  "/src/tournament_forecaster/council/runner.py",
  "/src/tournament_forecaster/data/presets/champions-league-style/tournament.json",
  "/src/tournament_forecaster/data/presets/libertadores-style/tournament.json",
  "/src/tournament_forecaster/data/presets/synthetic-cup/tournament.json",
  "/src/tournament_forecaster/data/presets/world-cup-style/tournament.json",
  "/src/tournament_forecaster/data/templates/group-knockout/README.md",
