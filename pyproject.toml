[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tournament-forecaster"
version = "0.1.0"
description = "Configuration-driven tournament forecasting."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "Marcus Cavalcanti" }]
dependencies = []
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Scientific/Engineering :: Information Analysis",
]

[project.optional-dependencies]
dev = [
  "build>=1.2,<2",
  "jsonschema>=4.23,<5",
  "mypy>=1.13,<2",
  "Pillow>=11,<13",
  "pytest>=8.3,<10",
  "pytest-socket>=0.7,<1",
  "ruff>=0.9,<1",
  "twine>=6,<7",
  "types-jsonschema>=4.23,<5",
]

[project.urls]
Homepage = "https://github.com/marcuscavalcanti/worldcup2026"
Documentation = "https://github.com/marcuscavalcanti/worldcup2026#readme"
Issues = "https://github.com/marcuscavalcanti/worldcup2026/issues"
Source = "https://github.com/marcuscavalcanti/worldcup2026"

[project.scripts]
tournament-forecast = "tournament_forecaster.cli:main"
worldcup-brazil-report = "worldcup_brazil.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/tournament_forecaster", "worldcup_brazil"]

[tool.pytest.ini_options]
pythonpath = [".", "src"]
testpaths = ["tests"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_unreachable = true
exclude = [
  "^worldcup_brazil/",
  "^src/tournament_forecaster/compatibility/",
]
