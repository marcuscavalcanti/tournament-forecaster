  <path class="flow-constraint" d="M1184 852 H1362 V846 H1432"/>
  <path class="flow" d="M960 1112 V1134"/>

  <!-- Entry and run context -->
  <circle cx="67" cy="152" r="17" fill="#ff9900"/>
  <text class="step-text" x="67" y="152">1</text>
  <text class="zone-title" x="118" y="146" fill="#232f3e">Entry</text>
  <text class="body" x="118" y="168">Run start</text>

  <rect class="card" x="184" y="123" width="132" height="58" rx="6"/>
  <text class="card-title" x="250" y="148" text-anchor="middle">User or CI</text>
  <text class="body" x="250" y="168" text-anchor="middle">offline by default</text>

  <rect class="card-navy" x="390" y="118" width="422" height="68" rx="6"/>
  <text class="card-title-light" x="601" y="145" text-anchor="middle">tournament-forecast CLI</text>
  <text class="body-light" x="601" y="166" text-anchor="middle">quickstart | validate | update | simulate | report</text>

  <rect class="card-orange" x="884" y="118" width="522" height="68" rx="6"/>
  <text class="card-title" x="1145" y="145" text-anchor="middle">Run context</text>
  <text class="body" x="1145" y="166" text-anchor="middle">run_id | seed | cache policy | timestamps | input provenance</text>

  <rect class="card-green" x="1476" y="118" width="346" height="68" rx="6"/>
  <text class="card-title" x="1649" y="145" text-anchor="middle">Safe defaults</text>
  <text class="body" x="1649" y="166" text-anchor="middle">no keys or executable bridges required</text>

  <!-- Input classes -->
  <circle cx="68" cy="245" r="16" fill="#ff9900"/>
  <text class="step-text" x="68" y="245">2</text>
  <text class="zone-title" x="96" y="252">Input adapters normalize two classes of information</text>
  <text class="subzone-title" x="88" y="304">TOURNAMENT TRUTH</text>
  <text class="subzone-title" x="1232" y="304" fill="#1b73b8">OPTIONAL EXTERNAL EVIDENCE</text>

  <rect class="card" x="88" y="320" width="190" height="62" rx="6"/>
  <text class="card-title" x="183" y="345" text-anchor="middle">Config or preset</text>
  <text class="body" x="183" y="366" text-anchor="middle">teams, stages, rules</text>
  <rect class="card" x="300" y="320" width="220" height="62" rx="6"/>
  <text class="card-title" x="410" y="345" text-anchor="middle">Result ledger</text>
  <text class="body" x="410" y="366" text-anchor="middle">ratings and locked facts</text>
  <rect class="card" x="542" y="320" width="220" height="62" rx="6"/>
  <text class="card-title" x="652" y="345" text-anchor="middle">Results provider</text>
  <text class="body" x="652" y="366" text-anchor="middle">FIFA, JSON, or CSV</text>
  <rect class="card" x="784" y="320" width="194" height="62" rx="6"/>
  <text class="card-title" x="881" y="345" text-anchor="middle">Legacy adapter</text>
  <text class="body" x="881" y="366" text-anchor="middle">versioned migration</text>
  <rect class="card-green" x="1000" y="316" width="154" height="70" rx="6"/>
  <text class="card-title" x="1077" y="343" text-anchor="middle">Normalized</text>
  <text class="card-title" x="1077" y="363" text-anchor="middle">facts</text>

  <path class="flow-light" d="M183 382 V396 H1077 V386"/>
  <path class="flow-light" d="M410 382 V396 H1077 V386"/>
  <path class="flow-light" d="M652 382 V396 H1077 V386"/>
  <path class="flow-light" d="M881 382 V396 H1077 V386"/>

  <rect class="card-blue" x="1232" y="320" width="150" height="62" rx="6"/>
  <text class="card-title" x="1307" y="345" text-anchor="middle">Odds</text>
  <text class="body" x="1307" y="366" text-anchor="middle">structured evidence</text>
  <rect class="card-blue" x="1400" y="320" width="150" height="62" rx="6"/>
  <text class="card-title" x="1475" y="345" text-anchor="middle">Models</text>
  <text class="body" x="1475" y="366" text-anchor="middle">optional providers</text>
  <rect class="card-blue" x="1568" y="320" width="150" height="62" rx="6"/>
  <text class="card-title" x="1643" y="345" text-anchor="middle">Bridges</text>
  <text class="body" x="1643" y="366" text-anchor="middle">explicitly enabled</text>
  <rect class="card-blue" x="1740" y="316" width="96" height="70" rx="6"/>
  <text class="small" x="1788" y="347" text-anchor="middle" fill="#1b73b8">EVIDENCE</text>
  <text class="body" x="1788" y="369" text-anchor="middle">normalized</text>
  <path class="flow-optional" d="M1307 382 V396 H1788 V386"/>
  <path class="flow-optional" d="M1475 382 V396 H1788 V386"/>
  <path class="flow-optional" d="M1643 382 V396 H1788 V386"/>

  <!-- Validation boundary -->
  <circle cx="68" cy="477" r="16" fill="#ff9900"/>
  <text class="step-text" x="68" y="477">3</text>
  <text class="zone-title" x="96" y="484">Validation gates</text>
  <text class="small" x="496" y="484" text-anchor="end" fill="#ffffff">FAIL EARLY</text>

  <rect class="card" x="92" y="526" width="376" height="66" rx="6"/>
  <text class="card-title" x="280" y="553" text-anchor="middle">Load and normalize schema versions</text>
  <text class="body" x="280" y="575" text-anchor="middle">stable IDs and compatibility translation</text>
  <rect class="card" x="92" y="610" width="376" height="66" rx="6"/>
  <text class="card-title" x="280" y="637" text-anchor="middle">Schema and semantic validation</text>
  <text class="body" x="280" y="659" text-anchor="middle">teams, stages, fixtures, and rules</text>
  <rect class="card" x="92" y="694" width="376" height="66" rx="6"/>
  <text class="card-title" x="280" y="721" text-anchor="middle">Stage graph and entrant validation</text>
  <text class="body" x="280" y="743" text-anchor="middle">every source resolves to a legal destination</text>
  <rect class="card-orange" x="92" y="778" width="376" height="74" rx="6"/>
  <text class="card-title" x="280" y="805" text-anchor="middle">Freshness, alias, fixture, and conflict gates</text>
  <text class="body" x="280" y="827" text-anchor="middle">Locked results remain immutable</text>
  <rect class="card-green" x="92" y="872" width="376" height="44" rx="6"/>
  <text class="card-title" x="280" y="899" text-anchor="middle">Validated domain model</text>
  <path class="flow" d="M280 592 V610"/>
  <path class="flow" d="M280 676 V694"/>
  <path class="flow" d="M280 760 V778"/>
  <path class="flow" d="M280 852 V872"/>

  <!-- Deterministic engine -->
  <circle cx="576" cy="477" r="16" fill="#ff9900"/>
  <text class="step-text" x="576" y="477">4</text>
  <text class="zone-title" x="604" y="484">Deterministic tournament engine</text>
  <text class="small" x="1120" y="484" text-anchor="middle" fill="#ffffff">AUTHORITATIVE OFFLINE CORE</text>

  <rect class="card" x="594" y="532" width="220" height="78" rx="6"/>
  <text class="card-title" x="704" y="559" text-anchor="middle">Stage engine</text>
  <text class="body" x="704" y="581" text-anchor="middle">groups, league table,</text>
  <text class="body" x="704" y="599" text-anchor="middle">and knockout stages</text>
  <rect class="card" x="840" y="532" width="220" height="78" rx="6"/>
  <text class="card-title" x="950" y="559" text-anchor="middle">Match model</text>
  <text class="body" x="950" y="581" text-anchor="middle">ratings, context, scores,</text>
  <text class="body" x="950" y="599" text-anchor="middle">extra time, penalties</text>
  <rect class="card" x="1086" y="532" width="220" height="78" rx="6"/>
  <text class="card-title" x="1196" y="559" text-anchor="middle">Completed facts</text>
  <text class="body" x="1196" y="581" text-anchor="middle">real standings and</text>
  <text class="body" x="1196" y="599" text-anchor="middle">locked bracket slots</text>

  <rect class="card" x="594" y="656" width="220" height="78" rx="6"/>
  <text class="card-title" x="704" y="683" text-anchor="middle">Qualification</text>
  <text class="body" x="704" y="705" text-anchor="middle">standings, tiebreakers,</text>
  <text class="body" x="704" y="723" text-anchor="middle">and rank bands</text>
  <rect class="card" x="840" y="656" width="220" height="78" rx="6"/>
  <text class="card-title" x="950" y="683" text-anchor="middle">Pairing and bracket</text>
  <text class="body" x="950" y="705" text-anchor="middle">fixed, seeded, open draw,</text>
  <text class="body" x="950" y="723" text-anchor="middle">one or two legs</text>
  <rect class="card-orange" x="1086" y="656" width="220" height="78" rx="6"/>
  <text class="card-title" x="1196" y="683" text-anchor="middle">Monte Carlo</text>
  <text class="body" x="1196" y="705" text-anchor="middle">seeded simulation of the</text>
  <text class="body" x="1196" y="723" text-anchor="middle">complete competition</text>

  <rect class="card-green" x="716" y="814" width="468" height="76" rx="6"/>
  <text class="card-title" x="950" y="841" text-anchor="middle">Probability and coherence invariants</text>
  <text class="body" x="950" y="863" text-anchor="middle">monotonic stage reach | legal opponents | locked-result consistency</text>

  <path class="flow" d="M704 610 V656"/>
  <path class="flow" d="M814 695 H840"/>
  <path class="flow" d="M1060 695 H1086"/>
  <path class="flow" d="M1196 610 V656"/>
  <path class="flow" d="M950 610 V656"/>
  <path class="flow" d="M1196 734 V780 H950 V814"/>

  <!-- Optional intelligence -->
  <circle cx="1408" cy="477" r="16" fill="#ff9900"/>
  <text class="step-text" x="1408" y="477">5</text>
  <text class="zone-title" x="1436" y="484">Optional intelligence</text>
  <text class="small" x="1750" y="484" text-anchor="middle" fill="#ffffff">NEVER OWNS TOPOLOGY</text>

  <rect class="card-blue" x="1432" y="526" width="396" height="62" rx="6"/>
  <text class="card-title" x="1630" y="552" text-anchor="middle">Credential redaction and bridge policy</text>
  <text class="body" x="1630" y="573" text-anchor="middle">missing providers degrade only their own slot</text>
  <rect class="card-blue" x="1432" y="610" width="396" height="62" rx="6"/>
  <text class="card-title" x="1630" y="636" text-anchor="middle">Source plan and evidence collection</text>
  <text class="body" x="1630" y="657" text-anchor="middle">injuries, availability, odds, travel, tactics</text>
  <rect class="card-blue" x="1432" y="694" width="190" height="72" rx="6"/>
  <text class="card-title" x="1527" y="721" text-anchor="middle">Path room</text>
  <text class="body" x="1527" y="742" text-anchor="middle">opponents by stage</text>
  <rect class="card-blue" x="1638" y="694" width="190" height="72" rx="6"/>
  <text class="card-title" x="1733" y="721" text-anchor="middle">Main council</text>
  <text class="body" x="1733" y="742" text-anchor="middle">structured debate</text>
  <rect class="card-blue" x="1432" y="810" width="396" height="72" rx="6"/>
  <text class="card-title" x="1630" y="837" text-anchor="middle">Validation, repair, and consensus</text>
  <text class="body" x="1630" y="858" text-anchor="middle">bounded context or an auditable no-op</text>
  <rect class="card-orange" x="1516" y="902" width="228" height="36" rx="18"/>
  <text class="small" x="1630" y="925" text-anchor="middle" fill="#232f3e">BOUNDED CONTEXT ONLY</text>
  <path class="flow-optional" d="M1630 588 V610"/>
  <path class="flow-optional" d="M1630 672 V684 H1527 V694"/>
  <path class="flow-optional" d="M1630 672 V684 H1733 V694"/>
  <path class="flow-optional" d="M1527 766 V790 H1630 V810"/>
  <path class="flow-optional" d="M1733 766 V790 H1630 V810"/>
  <path class="flow-optional" d="M1630 882 V902"/>

  <!-- Versioned outputs -->
  <circle cx="68" cy="1013" r="16" fill="#ff9900"/>
  <text class="step-text" x="68" y="1013">6</text>
  <text class="zone-title" x="96" y="1020">Versioned outputs and run observability</text>

  <rect class="card-orange" x="700" y="1048" width="520" height="64" rx="8"/>
  <text class="card-title" x="960" y="1074" text-anchor="middle">Configured forecast finalizer</text>
  <text class="body" x="960" y="1095" text-anchor="middle">deterministic baseline + optional bounded context + invariant recheck</text>
  <rect class="card-green" x="748" y="1134" width="424" height="42" rx="6"/>
  <text class="card-title" x="960" y="1160" text-anchor="middle">Neutral forecast schema</text>

  <rect class="card" x="78" y="1190" width="240" height="32" rx="5"/>
  <text class="small" x="198" y="1211" text-anchor="middle">FORECAST.JSON</text>
  <rect class="card" x="378" y="1190" width="240" height="32" rx="5"/>
  <text class="small" x="498" y="1211" text-anchor="middle">REPORT.MD</text>
  <rect class="card" x="678" y="1190" width="240" height="32" rx="5"/>
  <text class="small" x="798" y="1211" text-anchor="middle">BRACKET.SVG</text>
  <rect class="card" x="978" y="1190" width="240" height="32" rx="5"/>
  <text class="small" x="1098" y="1211" text-anchor="middle">AUDIT + WATCHDOG</text>
  <rect class="card" x="1278" y="1190" width="240" height="32" rx="5"/>
  <text class="small" x="1398" y="1211" text-anchor="middle">LEGACY EMITTER</text>
  <rect class="card" x="1578" y="1190" width="240" height="32" rx="5"/>
  <text class="small" x="1698" y="1211" text-anchor="middle">PUBLISHING TEMPLATES</text>

  <path class="flow" d="M960 1176 V1182 H198 V1190"/>
  <path class="flow" d="M960 1176 V1182 H498 V1190"/>
  <path class="flow" d="M960 1176 V1190 H798"/>
  <path class="flow" d="M960 1176 V1182 H1098 V1190"/>
  <path class="flow" d="M960 1176 V1182 H1398 V1190"/>
  <path class="flow" d="M960 1176 V1182 H1698 V1190"/>

  <text class="small" x="46" y="1260">TRUST RULE: PROVIDERS AND MODELS MAY ENRICH CONTEXT; THEY MAY NOT REWRITE LOCKED RESULTS OR TOURNAMENT TOPOLOGY.</text>
  <text class="small" x="1874" y="1260" text-anchor="end">ATOMIC WRITES | REDACTED SETTINGS | STABLE RUN_ID</text>
</svg>
