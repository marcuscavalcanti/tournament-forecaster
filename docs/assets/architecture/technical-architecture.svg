<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1280" viewBox="0 0 1920 1280" role="img" aria-labelledby="title desc">
  <title id="title">Tournament Forecaster technical architecture</title>
  <desc id="desc">AWS-style technical architecture showing trusted tournament inputs, validation gates, the deterministic tournament engine, optional intelligence, forecast finalization, and versioned outputs.</desc>
  <defs>
    <style>
      .canvas { fill: #ffffff; }
      .zone { fill: #f7f8fa; stroke: #aab7b8; stroke-width: 2; }
      .subzone { fill: #ffffff; stroke: #879196; stroke-width: 1.8; }
      .subzone-blue { fill: #f2f8fc; stroke: #1b73b8; stroke-width: 2; stroke-dasharray: 8 5; }
      .zone-head { fill: #232f3e; }
      .card { fill: #ffffff; stroke: #879196; stroke-width: 2; }
      .card-orange { fill: #fff3e0; stroke: #ff9900; stroke-width: 2.5; }
      .card-blue { fill: #eaf4fb; stroke: #1b73b8; stroke-width: 2; }
      .card-green { fill: #eaf7e7; stroke: #1d8102; stroke-width: 2; }
      .card-navy { fill: #232f3e; stroke: #232f3e; stroke-width: 2; }
      .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #232f3e; }
      .subtitle { font: 400 17px Arial, Helvetica, sans-serif; fill: #5f6b7a; }
      .zone-title { font: 700 18px Arial, Helvetica, sans-serif; fill: #ffffff; }
      .subzone-title { font: 700 14px Arial, Helvetica, sans-serif; fill: #232f3e; letter-spacing: .5px; }
      .card-title { font: 700 16px Arial, Helvetica, sans-serif; fill: #232f3e; }
      .card-title-light { font: 700 16px Arial, Helvetica, sans-serif; fill: #ffffff; }
      .body { font: 400 13px Arial, Helvetica, sans-serif; fill: #45515d; }
      .body-light { font: 400 13px Arial, Helvetica, sans-serif; fill: #e9eef2; }
      .small { font: 700 11px Arial, Helvetica, sans-serif; fill: #5f6b7a; letter-spacing: .6px; }
      .step-text { font: 700 15px Arial, Helvetica, sans-serif; fill: #ffffff; text-anchor: middle; dominant-baseline: central; }
      .flow { fill: none; stroke: #5f6b7a; stroke-width: 2.8; marker-end: url(#arrow); }
      .flow-light { fill: none; stroke: #aab7b8; stroke-width: 2.2; marker-end: url(#arrow); }
      .flow-optional { fill: none; stroke: #1b73b8; stroke-width: 2.8; stroke-dasharray: 9 6; marker-end: url(#arrow-blue); }
      .flow-constraint { fill: none; stroke: #ff9900; stroke-width: 2.8; stroke-dasharray: 5 5; marker-end: url(#arrow-orange); }
      .icon-line { fill: none; stroke: #ffffff; stroke-width: 2.8; stroke-linecap: round; stroke-linejoin: round; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#5f6b7a"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#1b73b8"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#ff9900"/>
    </marker>
  </defs>

  <rect class="canvas" x="0" y="0" width="1920" height="1280"/>
  <rect x="0" y="0" width="1920" height="12" fill="#ff9900"/>
  <text class="title" x="46" y="55">Tournament Forecaster</text>
  <text class="subtitle" x="46" y="82">Technical architecture and ownership boundaries</text>
  <rect x="1480" y="28" width="190" height="38" rx="19" fill="#fff3e0" stroke="#ff9900" stroke-width="2"/>
  <text class="small" x="1575" y="52" text-anchor="middle" fill="#232f3e">SOLID = AUTHORITY</text>
  <rect x="1690" y="28" width="184" height="38" rx="19" fill="#eaf4fb" stroke="#1b73b8" stroke-width="2"/>
  <text class="small" x="1782" y="52" text-anchor="middle" fill="#1b73b8">DASHED = OPTIONAL</text>

