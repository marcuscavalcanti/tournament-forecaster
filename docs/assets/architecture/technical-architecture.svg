  <path class="flow" d="M316 152 H390"/>
  <path class="flow" d="M812 152 H884"/>
  <path class="flow" d="M1406 152 H1476"/>
  <path class="flow" d="M1100 380 V440 H280 V524"/>
  <path class="flow-optional" d="M1788 386 V524 H1630"/>
