  <path d="M1388 454 H1872 A8 8 0 0 1 1880 462 V500 H1380 V462 A8 8 0 0 1 1388 454 Z" fill="#1b73b8"/>

  <rect class="zone" x="40" y="990" width="1840" height="246" rx="8"/>
  <path class="zone-head" d="M48 990 H1872 A8 8 0 0 1 1880 998 V1036 H40 V998 A8 8 0 0 1 48 990 Z"/>

